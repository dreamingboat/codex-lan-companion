<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex LAN Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell" id="shell">
      <button id="sidebarToggle" class="drawer-tab" title="显示对话列表" aria-label="显示对话列表">☰</button>
      <aside class="sidebar">
        <div class="sidebar-top">
          <div>
            <h1>Codex</h1>
            <p id="threadCount">加载中</p>
          </div>
          <div class="sidebar-actions">
            <button id="refreshButton" class="icon-button" title="刷新">↻</button>
            <button id="sidebarCloseButton" class="icon-button" title="隐藏对话列表" aria-label="隐藏对话列表">‹</button>
          </div>
        </div>
        <input id="searchInput" class="search" type="search" placeholder="搜索对话" autocomplete="off" />
        <div id="threadList" class="thread-list" aria-label="对话列表"></div>
      </aside>

      <section class="conversation">
        <header class="conversation-header">
          <div>
            <h2 id="threadTitle">选择一个对话</h2>
            <p id="threadMeta">每 3 秒自动同步</p>
          </div>
          <label class="toggle">
            <input id="toolToggle" type="checkbox" />
            <span>工具</span>
          </label>
        </header>
        <div id="messageList" class="message-list">
          <div class="empty-state">从左侧选择一个 Codex 对话。</div>
        </div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
